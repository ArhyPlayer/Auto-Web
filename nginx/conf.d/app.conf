# ─── Основной сайт (лид-форма) ────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Редирект /docs -> /api/docs (чтобы Swagger отправлял запросы на /api/*)
    location = /docs {
        return 302 /api/docs;
    }

    # Проксирование API на Backend (приватный, только внутри контура)
    # /api/docs, /api/openapi.json, /api/admin-config, /api/leads/submit и т.д.
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_request_buffering on;
        proxy_buffering on;
        proxy_buffer_size 4k;
        client_max_body_size 2m;
    }

    # Отдаём SPA / статику
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Запрет прямого обращения к внутренним маршрутам
    location ~ ^/(admin|internal)/ {
        return 403;
    }
}

# ─── pgAdmin (порт 8080) ───────────────────────────────────────────────────────
server {
    listen 8080;
    server_name _;

    # Базовые заголовки безопасности
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://pgadmin/;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_redirect     off;
        proxy_buffering    off;

        # WebSocket support (pgAdmin использует его)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        client_max_body_size 10m;
    }
}
