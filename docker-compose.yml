services:

  # ─────────────────────────────────────────────────────────────────────────────
  # NGINX — единственная точка входа извне
  # Порт 80: лид-форма / frontend / API (через /api/)
  # Backend доступен только через Nginx, порт не пробрасывается
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    networks:
      - frontend_net
    depends_on:
      - backend
    mem_limit: 128m
    memswap_limit: 128m

  # ─────────────────────────────────────────────────────────────────────────────
  # PostgreSQL — база данных (изолирована, доступ только из db_net)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    memswap_limit: 512m

  # ─────────────────────────────────────────────────────────────────────────────
  # BACKEND — FastAPI, доступ только через Nginx (порт не пробрасывается)
  # ─────────────────────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-secret-key-32chars}
      ENABLE_DOCS: ${ENABLE_DOCS:-0}
    networks:
      - frontend_net   # чтобы Nginx мог достучаться
      - db_net         # чтобы достучаться до PostgreSQL
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    memswap_limit: 512m

# ─────────────────────────────────────────────────────────────────────────────
# Сети
# ─────────────────────────────────────────────────────────────────────────────
networks:
  frontend_net:
    driver: bridge
    # Nginx <-> Backend

  db_net:
    driver: bridge
    internal: true   # нет выхода наружу — только внутри контура
    # postgres <-> backend

# ─────────────────────────────────────────────────────────────────────────────
# Тома
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
